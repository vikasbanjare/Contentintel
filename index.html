};
function ciHeroVideo(theme)    { return (theme === 'light' && CI_VIDEOS.heroLight)    ? CI_VIDEOS.heroLight    : CI_VIDEOS.heroDark; }
function ciAmbientVideo(theme) { return (theme === 'light' && CI_VIDEOS.ambientLight) ? CI_VIDEOS.ambientLight : CI_VIDEOS.ambientDark; }
window.CI_VIDEOS = CI_VIDEOS;

// Shared theme hook: tracks the current theme and updates live when toggled.
function useCITheme() {
  const read = () => (typeof document !== 'undefined' && document.documentElement.getAttribute('data-theme') === 'light') ? 'light' : 'dark';
  const [t, setT] = React.useState(read);
  React.useEffect(() => {
    const f = () => setT(read());

window.CITabIcon = CITabIcon;

// Light / dark theme toggle (persists in localStorage; applied to <html data-theme>).
function ThemeToggle() {
  const [light, setLight] = React.useState(() => {
    try { return localStorage.getItem('ci_theme') === 'light'; } catch (e) { return false; }
  });
  React.useEffect(() => {
    const root = document.documentElement;
    if (light) root.setAttribute('data-theme', 'light'); else root.removeAttribute('data-theme');
    try { localStorage.setItem('ci_theme', light ? 'light' : 'dark'); } catch (e) {}
    try { window.dispatchEvent(new Event('ci-theme')); } catch (e) {}
  }, [light]);
  return (
    <button className={'ci-themeswitch' + (light ? ' light' : '')} title={light ? 'Switch to dark mode' : 'Switch to light mode'}
      onClick={() => setLight(v => !v)} aria-label="Toggle theme">
      <span className="ci-themeswitch-icon sun">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="8" cy="8" r="3"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M12.5 3.5l-1.4 1.4M4.9 11.1l-1.4 1.4"/></svg>

      </span>
      <span className="ci-themeswitch-knob" />
    </button>
  );
}
window.ThemeToggle = ThemeToggle;

// Copy-to-clipboard block
// Robust copy — clipboard API with an execCommand fallback for sandbox / file://
// / non-HTTPS contexts where navigator.clipboard is blocked. Resolves true/false.
function copyText(text) {
  const t = typeof text === 'string' ? text : String(text == null ? '' : text);
  return new Promise((resolve) => {
    const fallback = () => {
      try {
        const ta = document.createElement('textarea');
        ta.value = t; ta.setAttribute('readonly', '');
        ta.style.position = 'fixed'; ta.style.top = '-9999px'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        try { ta.setSelectionRange(0, t.length); } catch (e) {}
        const ok = document.execCommand('copy');
        document.body.removeChild(ta); resolve(!!ok);
      } catch (e) { resolve(false); }
    };
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(t).then(() => resolve(true), fallback);
      } else fallback();
    } catch (e) { fallback(); }
  });
}
function downloadText(text, filename) {
  try {
    const blob = new Blob([text || ''], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = filename || 'report.txt'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch (e) {}
}

function CopyBlock({ text, label = 'Copy', mono = false, onApply, applyLabel = '← Use hook' }) {
  const [done, setDone] = React.useState(false);
  const [applied, setApplied] = React.useState(false);
  function copy() {
    copyText(text).then(ok => {
      setDone(ok ? 'done' : 'fail');
      setTimeout(() => setDone(false), 1600);
    });
  }
  function handleApply() {
    onApply();
    setApplied(true);
    setTimeout(() => setApplied(false), 1800);
  }
  return (
    <div className="ci-copyblock">
      <div className="ci-copyblock-text" style={mono ? { fontFamily: 'var(--font-mono)', fontSize: 12.5 } : {}}>{text}</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 5, flexShrink: 0 }}>
        {onApply && (
          <button className={'ci-copybtn' + (applied ? ' done' : '')}
            style={applied ? {} : { background: 'rgba(100,160,255,0.12)', borderColor: 'rgba(100,160,255,0.35)', color: '#7eb8ff' }}
            onClick={handleApply}>{applied ? '✓ Applied' : applyLabel}</button>
        )}
        <button className={'ci-copybtn' + (done === 'done' ? ' done' : '')} onClick={copy}>
          {done === 'done' ? '✓ Copied' : done === 'fail' ? 'Press Ctrl/⌘+C' : <>⧉ {label}</>}
        </button>
      </div>
    </div>
  );
}

function CIChip({ active, onClick, children }) {
  return (
    <button className={'pill' + (active ? ' active' : '')} onClick={onClick} style={{ height: 30, fontSize: 12.5 }}>
      {children}

}

  const r = (size - 10) / 2, c = 2 * Math.PI * r, off = c * (1 - v / 100), cc = size / 2;

// Script quality / attention curve over the runtime
function QualityGraph({ points = [], mood = 'navy' }) {
  const m = RM[mood] || RM.navy;
  const pts = (points || []).filter(p => p && typeof p.value === 'number').slice(0, 14);
  if (pts.length < 2) return null;
  const W = 1000, H = 240, padX = 34, padTop = 18, padBot = 52;
  const innerW = W - padX * 2, innerH = H - padTop - padBot, base = padTop + innerH;
  const xs = i => padX + (innerW * i) / (pts.length - 1);
  const ys = v => padTop + innerH * (1 - Math.max(0, Math.min(100, v)) / 100);
  const line = pts.map((p, i) => `${i ? 'L' : 'M'}${xs(i).toFixed(1)},${ys(p.value).toFixed(1)}`).join(' ');
  const area = `${line} L${xs(pts.length - 1).toFixed(1)},${base} L${xs(0).toFixed(1)},${base} Z`;
  const accent = m.accentFrom;
  const gid = 'qg-' + mood;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: 'block' }}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={accent} stopOpacity="0.32" />
          <stop offset="100%" stopColor={accent} stopOpacity="0" />
        </linearGradient>
      </defs>
      {[25, 50, 75].map(g => (
        <line key={g} x1={padX} y1={ys(g)} x2={W - padX} y2={ys(g)} stroke="rgba(255,255,255,0.06)" strokeWidth="1" strokeDasharray="4 6" />
      ))}
      <path d={area} fill={`url(#${gid})`} />
      <path d={line} fill="none" stroke={accent} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" style={{ filter: `drop-shadow(0 0 4px ${m.accentGlow})` }} />
      {pts.map((p, i) => {
        const low = p.value < 42;
        return (
          <g key={i}>
            <circle cx={xs(i)} cy={ys(p.value)} r={low ? 6 : 4.5} fill={low ? '#F06A7E' : accent} stroke="#0b0e15" strokeWidth="2" />
            <text x={xs(i)} y={H - 28} textAnchor="middle" fontFamily="var(--font-mono)" fontSize="15" fill="var(--text-3)">{p.label || (i + 1)}</text>
          </g>
        );
      })}
    </svg>
  );
}

          </div>
        );
      })}
    </div>
  );
}

<script type="text/babel" data-presets="react">
/* ===== ci-ask.jsx ===== */
// ContentIntel — Ask tab: research-grounded growth Q&A (Instagram / YouTube / any platform)

const { MOODS: AM, Block: AB, RunButton: ARB, WorkHead: AWH, LoadingResults: ALR } = window;

const ASK_SUGGESTIONS = [
  'Why are my Reels stuck at 200 views?',
  'Best time to post on Instagram?',
  'How many hashtags should I actually use?',
  'How do I get more saves and shares?',
  'Reels vs carousels — what grows faster?',
  'How do I do Instagram SEO for my page?',
  "My followers grow but views don't. Why?",
  'How much should I charge for a brand deal?',
  'What should I post on each day of the week?',
  'How do trial reels work?',
];

function buildAskSystem() {
  const core = (window.liveResearch().core || '');
  const askR = window.getResearch('ask') || {};
  return [
    `You are ContentIntel's growth strategist. Answer the user's question directly, specifically and practically.`,
    `LANGUAGE LAW: answer in the same language as the question (Hindi -> Hindi, Hinglish -> Hinglish, English -> English).`,
    core ? 'SHARED RESEARCH:\n"""\n' + core + '\n"""' : '',
    askR.systemGuidance || '',
    askR.notes || 'Output JSON: {"answer":"2-5 short paragraphs","steps":["3-6 do-today actions"],"related":["2-3 follow-up questions"]}. Return ONLY the JSON object.',
  ].filter(Boolean).join('\n\n');
}

function AskTab({ onOpenKey }) {
  const mood = 'violet';
  const m = AM[mood];
  const [q, setQ] = React.useState('');
  const [state, setState] = React.useState('idle'); // idle | loading | done | error
  const [out, setOut] = React.useState(null);
  const [err, setErr] = React.useState('');
  const [asked, setAsked] = React.useState('');
  const inputRef = React.useRef(null);

  async function ask(question) {
    const text = String(question || q).trim();
    if (!text) return;
    setQ(text); setAsked(text); setErr(''); setOut(null); setState('loading');
    try {
      const { text: raw } = await window.callClaude({
        system: buildAskSystem(),
        userText: `QUESTION: ${text}`,
        maxTokens: 2200,
      });
      let json = window.parseReport(raw);
      if (!json || (!json.answer && !json.steps)) {
        const body = (raw || '').trim();
        if (!body) throw new Error('Empty response — try again.');
        json = { answer: body, steps: [], related: [] };
      }
      setOut(json); setState('done');
      try { window.saveHistory({ type: 'ask', t: Date.now(), level: 'green', score: null, title: text.slice(0, 80) }); } catch (e) {}
      document.querySelector('.ci-scroll')?.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (e) {
      if (String(e.message) === 'NO_KEY') {
        setErr('Add your Anthropic API key (top-right) to ask live questions — it takes 30 seconds.');
      } else {
        setErr(e.message || 'Something went wrong — try again.');
      }
      setState('error');
    }
  }

  return (
    <div className="ci-work" style={{ '--ci-accent': m.accentFrom, '--ci-glow': m.accentGlow }}>
      <AWH mood={mood} eyebrow="Ask anything" title="Your growth questions, answered"
        sub="Instagram, YouTube, Reels, SEO, brand deals — ask in any language. Answers come from real platform research, not generic advice." />

      <AB mood={mood} style={{ padding: 22 }}>
        <div style={{ display: 'flex', gap: 10 }}>
          <input ref={inputRef} className="ci-input" style={{ fontSize: 15.5, height: 52 }}
            value={q} onChange={e => setQ(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') ask(); }}
            placeholder="e.g. Why are my Reels stuck at 200 views?" />
          <ARB mood={mood} onClick={() => ask()} loading={state === 'loading'}>Ask →</ARB>
        </div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginTop: 14 }}>
          {ASK_SUGGESTIONS.map(s => (
            <button key={s} className="pill" style={{ height: 32, fontSize: 12.5 }} onClick={() => ask(s)}>{s}</button>
          ))}
        </div>
      </AB>

      {state === 'loading' && <div style={{ marginTop: 14 }}><ALR rows={3} /></div>}
      {state === 'error' && (
        <div className="ci-block" style={{ marginTop: 14, border: '1px solid rgba(245,120,140,0.3)' }}>
          <div style={{ fontSize: 13.5, color: 'var(--text-2)', lineHeight: 1.6 }}>{err}</div>
          <button className="ci-copybtn" style={{ height: 32, marginTop: 12 }} onClick={onOpenKey}>Open Settings</button>
        </div>
      )}

      {state === 'done' && out && (
        <div className="ci-results" style={{ marginTop: 16, display: 'flex', flexDirection: 'column', gap: 14 }}>
          <AB mood={mood}>
            <div style={{ fontSize: 12.5, color: 'var(--text-4)', marginBottom: 10 }}>You asked: <i>{asked}</i></div>
            <div style={{ fontSize: 15, lineHeight: 1.7, color: 'var(--text-1)', whiteSpace: 'pre-wrap' }}>{out.answer}</div>
          </AB>

          {Array.isArray(out.steps) && out.steps.length > 0 && (
            <AB title="Do this today" mood={mood}>
              {out.steps.map((st, i) => (
                <div key={i} style={{ display: 'flex', gap: 12, alignItems: 'flex-start', padding: '11px 0', borderTop: i ? '1px solid var(--stroke-1)' : 'none' }}>
                  <span style={{ width: 24, height: 24, borderRadius: 7, flexShrink: 0, background: `linear-gradient(135deg, ${m.accentFrom}, ${m.accentTo})`, color: '#07090E', display: 'grid', placeItems: 'center', fontWeight: 800, fontSize: 12.5 }}>{i + 1}</span>
                  <span style={{ fontSize: 14, lineHeight: 1.6, color: 'var(--text-1)' }}>{st}</span>
                </div>
              ))}
            </AB>
          )}

          {Array.isArray(out.related) && out.related.length > 0 && (
            <AB title="People also ask" mood={mood}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {out.related.map((r, i) => (
                  <button key={i} className="pill" style={{ height: 'auto', minHeight: 36, fontSize: 13.5, justifyContent: 'flex-start', textAlign: 'left', padding: '8px 14px', whiteSpace: 'normal' }} onClick={() => ask(r)}>
                    {r} →
                  </button>
                ))}
              </div>
            </AB>
          )}
        </div>
      )}
    </div>
  );
}
window.AskTab = AskTab;
</script>
<script type="text/babel" data-presets="react">
/* ===== ci-tabs.jsx ===== */
// ContentIntel -- Thumbnail / Title / Ads / History tabs

const {
  MOODS: TM, TrafficLight: TTL, Block: TB, ScoreItem: TSI, Issue: TIs,
  CopyBlock: TCB, ChipGroup: TCG, Toggle: TTg, RunButton: TRB,
  WorkHead: TWH, LoadingResults: TLR, QScore: TQS, Check: TCk,
} = window;

// Read an uploaded image file → { mime, data(base64, no prefix), preview }
function readImage(file, cb) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const url = reader.result;
    const img = new Image();
    img.onload = () => {
      const MAX = 1568;
      const scale = Math.min(1, MAX / Math.max(img.width, img.height));
      if (scale >= 1 && String(url).length < 2.5e6) {
        cb({ mime: file.type || 'image/png', data: String(url).split(',')[1] || '', preview: url, name: file.name });
        return;
      }
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const out = canvas.toDataURL('image/jpeg', 0.88);
      cb({ mime: 'image/jpeg', data: out.split(',')[1] || '', preview: out, name: file.name });
    };
    img.onerror = () => cb({ mime: file.type || 'image/png', data: String(url).split(',')[1] || '', preview: url, name: file.name });
    img.src = url;
  };
  reader.readAsDataURL(file);
}

function ImageDrop({ image, onPick, label }) {
  const id = React.useRef('drop-' + Math.random().toString(36).slice(2, 7)).current;
  return (
    <label htmlFor={id} className="ci-drop" style={{ minHeight: 150, flexDirection: 'column', gap: 8, overflow: 'hidden', padding: image ? 0 : 14 }}>
      <input id={id} type="file" accept="image/*" style={{ display: 'none' }}
        onChange={e => readImage(e.target.files[0], onPick)} />
      {image
        ? <div style={{ width: '100%', aspectRatio: '16/9', background: '#04060a', borderRadius: 11, display: 'grid', placeItems: 'center', overflow: 'hidden' }}>
            <img src={image.preview} alt="thumbnail preview" style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain', display: 'block' }} />
          </div>
        : <>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.6"/><path d="M3 16l5-5 4 4 3-3 6 6"/></svg>
            <span>{label}</span>
          </>}
    </label>
  );
}

// Brand kit -- persisted in the visitor's browser so they set colours once.
const LS_BRAND = 'ci_brandkit';
function loadBrandKit() {
  try { return JSON.parse(localStorage.getItem(LS_BRAND)) || { colors: [], note: '' }; }
  catch (e) { return { colors: [], note: '' }; }
}
function saveBrandKit(b) { try { localStorage.setItem(LS_BRAND, JSON.stringify(b)); } catch (e) {} }

const EMPHASIS_CHIPS = ['Add a face', 'Bigger number', 'Add a curved arrow', 'Add brand logo', 'More contrast', 'Less text', 'Yellow highlight box', 'Shocked expression'];

// Build a ready-to-paste image prompt + open ChatGPT with it. (ChatGPT can't be
// sent the image via URL, so the user attaches their thumbnail there.)
function chatgptPrompt(base, hasImage, strict, guidance) {
  const head = hasImage
    ? `Edit the attached YouTube thumbnail into an improved 16:9 version. ${strict ? 'KEEP the same person(s), the exact text, fonts and overall palette -- change ONLY what I describe below.' : 'A bolder redesign is fine, but keep the same person(s), topic and exact text.'}`
    : `Create a bold, high click-through 16:9 YouTube thumbnail.`;
  return `${head}\n\n${(base || '').trim()}${guidance ? '\n\n' + guidance : ''}`;
}
// Image generation is a handoff: copy the prompt + open ChatGPT or Gemini in a
// new tab (window.openInChatGPT / window.openInGemini). The user pastes their
// photo there. No in-app generator -- the free ones were unreliable.

// ── THUMBNAIL ────────────────────────────────────────────────────────────────
function ThumbnailTab({ onOpenKey }) {
  const mood = 'ember';
  const m = TM[mood];
  const [mode, setMode] = React.useState('Check');

  const [scheme, setScheme] = React.useState('Auto-detect');
  const [nicheSel, setNicheSel] = React.useState('Auto-detect');
  const [strict, setStrict] = React.useState(true);
  const [imgA, setImgA] = React.useState(null);
  const [imgB, setImgB] = React.useState(null);
  const [imgC, setImgC] = React.useState(null);
  const [descA, setDescA] = React.useState('');
  const [descB, setDescB] = React.useState('');
  const [descC, setDescC] = React.useState('');
  const LBL = ['A', 'B', 'C'];
  const imgsAll = [imgA, imgB, imgC], setImgs = [setImgA, setImgB, setImgC];
  const descsAll = [descA, descB, descC], setDescs = [setDescA, setDescB, setDescC];
  // Brand kit + regeneration guidance
  const [brand, setBrand] = React.useState(loadBrandKit);
  const [emphasis, setEmphasis] = React.useState([]);
  const [addNote, setAddNote] = React.useState('');
  React.useEffect(() => { saveBrandKit(brand); }, [brand]);
  const setColor = (i, v) => setBrand(b => ({ ...b, colors: b.colors.map((c, j) => j === i ? v : c) }));
  const addColor = () => setBrand(b => b.colors.length >= 5 ? b : ({ ...b, colors: [...b.colors, '#FFE14D'] }));
  const delColor = (i) => setBrand(b => ({ ...b, colors: b.colors.filter((_, j) => j !== i) }));
  const toggleEmph = (c) => setEmphasis(e => e.includes(c) ? e.filter(x => x !== c) : [...e, c]);
  const { state, report, usage, err, run } = window.useAnalysis('thumbnail');

  // Layout + colour options come straight from the research design library (single source of truth).
  const TLib = window.getResearch('thumbnail') || {};
  const layoutOpts = ['Auto-detect', ...((TLib.layouts || []).map(x => x.name))];
  const schemeOpts = ['Auto-detect', ...((TLib.colorSchemes || []).map(x => x.name))];
  const nicheOpts = ['Auto-detect', ...((window.nicheNames && window.nicheNames('thumbnail')) || []), 'None (universal)'];

  const hasVision = !!window.getKey(); // image vision only works with an API key; the free Claude AI is text-only
  const targetLine =
    (layout !== 'Auto-detect' ? `Target layout archetype: ${layout}\n` : '') +
    (scheme !== 'Auto-detect' ? `Target colour scheme: ${scheme}\n` : '') +
    ((layout === 'Auto-detect' && scheme === 'Auto-detect') ? 'Auto-detect the layout archetype and colour scheme and judge their fit.\n' : '');
  const brandColors = (brand.colors || []).filter(Boolean);
  const guidance = [
    brandColors.length ? `Brand colours: ${brandColors.join(', ')} -- build the regenerated thumbnail's palette around these (background / highlight box / number / accents) so it is on-brand, keeping strong contrast.` : '',
    brand.note ? `Brand notes: ${brand.note}` : '',
    emphasis.length ? `What to add / emphasise in the regeneration: ${emphasis.join('; ')}.` : '',
    addNote.trim() ? `Also for the regeneration: ${addNote.trim()}` : '',
  ].filter(Boolean).join('\n');
  const guidanceBlock = guidance ? `\nREGENERATION GUIDANCE:\n${guidance}\n` : '';
  const head = `Video title: ${(showTitle && title.trim()) ? title.trim() : '(none given)'}\nContent type: ${kind === 'Auto-detect' ? '(detect it from the thumbnail/title)' : kind}\n${targetLine}\n`;
  // No API key => the free AI is TEXT-ONLY and cannot see the uploaded images.
  // It must NOT fabricate scores or a winner it can't actually see.
  const noVision = !hasVision;
  const blindNote = noVision
    ? `IMPORTANT: Image vision is OFF (no API key connected). You CANNOT see the actual images -- judge ONLY from any text descriptions below. For ANY thumbnail with no description, you genuinely cannot evaluate it: do NOT guess, do NOT score it, and do NOT pick it as the winner. If you do not have enough described thumbnails to compare fairly, say so plainly and tell the user to connect an API key (for real image vision) or describe each thumbnail in words -- and in that case DO NOT output a winner.\n\n`
    : '';
  const cell = (i) => descsAll[i].trim() || (noVision ? '(no description given -- and the image cannot be seen)' : `(see attached Image ${i + 1})`);
  const userText = (compare
    ? head + blindNote +
      Array.from({ length: count }, (_, i) => `THUMBNAIL ${LBL[i]}${noVision ? '' : ` (= Image ${i + 1})`}: ${cell(i)}`).join('\n') + '\n\n' +
      `Compare these ${count} thumbnails for the SAME video and, ONLY if you can actually evaluate them, declare a single winner: fill the "winner" field with pick = A, B${count === 3 ? ' or C' : ''}, rank them and give the one specific reason it wins. Judge the ACTUAL execution you can see (text legibility, face/expression, contrast, focal clarity) -- a worse-executed "improved" version can legitimately lose to a cleaner original; never favour a version just because it is labelled the upgrade.`
    : head + blindNote +
      `THUMBNAIL: ${descA.trim() || (noVision ? '(no description given -- and the image cannot be seen)' : '(judge from the attached image)')}\n\n` +
      `Judge whether this thumbnail will earn the click.`) + guidanceBlock;
  // Vision works for single AND multi-image (A/B/C) when a key is present.
  const imgs = hasVision ? (compare ? imgsAll.slice(0, count).filter(Boolean) : (imgA ? [imgA] : [])) : [];
  // Ask for 3 ranked, ready-to-generate upgrade prompts (basic -> mild -> bold).
  const upgradeAsk = compare ? '' :
    '\n\nALSO: end the report with a "copy" section titled "3 ways to upgrade this thumbnail" containing EXACTLY 3 blocks, each a complete, ready-to-paste, DETAILED image prompt for ChatGPT/Gemini. The three MUST differ sharply in scope -- do NOT write three similar prompts; each must clearly change MORE than the one before, and read very differently:\n' +
    '- block 1 label "1 - Basic polish (keep the photo)": keep the EXACT same photo, person, face and expression and the same composition -- change NOTHING about the people. Only polish the design: bigger/bolder text with stronger contrast and better placement, sharpen the focal point, add/clean ONE highlight (box/outline/arrow), lift contrast. A quick edit, not a regeneration.\n' +
    '- block 2 label "2 - Mild redesign (same person & text, new design)": keep the same person, topic and EXACT text, but do NOT keep the existing layout -- redesign creatively: different composition and background, reposition/relight the subject, change or add visual elements, a bolder colour scheme.\n' +
    '- block 3 label "3 - Full reimagining (change everything)": reimagine the whole thumbnail -- you MAY change the expression, pose, composition, background, elements, colour and layout; keep ONLY the topic and exact text. The boldest, most scroll-stopping concept.';
  // Niche routing + edit mode are baked into the system prompt (one source of truth).
  // compactPlaybook trims the playbook when auto-detecting -> fewer input tokens.
  const system = window.buildSystem('thumbnail', { niche: nicheSel, relax: !strict, compactPlaybook: true });

  const estIn = window.estTokens(system, fullUserText) + imgs.length * 1400;
  // Generate mode: describe-from-scratch prompt (no analysis, no tokens).

  // Output headroom: A/B/C produces 3 full analyses + a winner, so it needs more

  function check() { run({ userText: fullUserText, images: imgs, maxTokens: count === 3 ? 8000 : count === 2 ? 6500 : 4500, system }); }

function timeAgo(t) {
  const s = Math.max(1, Math.floor((Date.now() - t) / 1000));
  if (s < 60) return s + 's ago';
  const mn = Math.floor(s / 60); if (mn < 60) return mn + 'm ago';
  const h = Math.floor(mn / 60); if (h < 24) return h + 'h ago';
  const d = Math.floor(h / 24); return d === 1 ? 'Yesterday' : d + 'd ago';
}

      const msg = String(e?.message || '');

  };
  reader.readAsDataURL(file);
}

  catch (e) { return { colors: [], note: '' }; }
}

async function bCopyImageToClipboard(dataUrl, mime) {
  const res = await fetch(dataUrl);
  const blob = await res.blob();
  if (!navigator.clipboard || !window.ClipboardItem) throw new Error('not supported');
  await navigator.clipboard.write([new ClipboardItem({ [blob.type || mime || 'image/png']: blob })]);
}

function BuilderTab() {
  const mood = 'ember';
  const m = BM[mood];

  const [ratio, setRatio] = React.useState('wide');
  const currentRatio = BUILDER_RATIOS.find(r => r.id === ratio) || BUILDER_RATIOS[0];

  const [people, setPeople] = React.useState([]);
  function addPerson() { if (people.length < 10) setPeople(ps => [...ps, { photo: null, expression: 'excited', desc: '' }]); }
  function setPersonPhoto(i, file) { bReadImage(file, img => setPeople(ps => ps.map((p, j) => j === i ? { ...p, photo: img } : p))); }
  function clearPersonPhoto(i) { setPeople(ps => ps.map((p, j) => j === i ? { ...p, photo: null } : p)); }
  function setPersonExpr(i, v) { setPeople(ps => ps.map((p, j) => j === i ? { ...p, expression: v } : p)); }
  function setPersonDesc(i, v) { setPeople(ps => ps.map((p, j) => j === i ? { ...p, desc: v } : p)); }
  function removePerson(i) { setPeople(ps => ps.filter((_, j) => j !== i)); }

  const [headline, setHeadline] = React.useState('');
  const [subline, setSubline] = React.useState('');
  const [elements, setElements] = React.useState([]);
  const toggleEl = el => setElements(es => es.includes(el) ? es.filter(x => x !== el) : [...es, el]);

  const [refImg, setRefImg] = React.useState(null);
  const [refOverride, setRefOverride] = React.useState(false);
  const [refState, setRefState] = React.useState('idle');
  const [refAnalysis, setRefAnalysis] = React.useState('');

  const [analyseImg, setAnalyseImg] = React.useState(null);
  const [analyseDesc, setAnalyseDesc] = React.useState('');
  const [analyseState, setAnalyseState] = React.useState('idle');
  const [analyseSummary, setAnalyseSummary] = React.useState('');
  const [feedback, setFeedback] = React.useState([]); // research-based "what's wrong" list
  const [upgrades, setUpgrades] = React.useState([]); // 3 tiers: basic / mild / full

  const [extraNote, setExtraNote] = React.useState('');
  const [brand] = React.useState(bLoadBrand);
  const brandColors = (brand.colors || []).filter(Boolean);
  const hasBrand = brandColors.length > 0 || !!brand.note;

  const [prompt, setPrompt] = React.useState('');
  const [built, setBuilt] = React.useState(false);
  const [copyFeedback, setCopyFeedback] = React.useState('');

  const hasKey = !!(window.getKey && window.getKey());
  const canCloud = !!(window.canRun && window.canRun()); // own key OR free Claude cloud

  // Research-grounded system prompt for the cloud check (NOT the report shape).
  function thumbSystem() {
    const r = (window.getResearch && window.getResearch('thumbnail')) || {};
    const st = (window.getResearch && window.getResearch('studio')) || {};
    const core = (window.liveResearch && window.liveResearch().core) || '';
    return [
      'You are a world-class YouTube thumbnail strategist. You judge thumbnails purely by what earns the click, grounded in the research below. Be specific and blunt -- no generic advice.',
      core ? 'RESEARCH PRINCIPLES:\n' + core : '',
      r.systemGuidance ? 'THUMBNAIL METHODOLOGY:\n' + r.systemGuidance : '',
      st.systemGuidance ? 'IMAGE-PROMPT QUALITY SCIENCE (every upgrade prompt MUST follow these rules):\n' + st.systemGuidance : '',
      'You will get a thumbnail as an image if one is attached, otherwise as a text description. Analyse it and return ONLY a single valid JSON object (no markdown, no text around it) in EXACTLY this shape:',
      '{ "whatsWrong": ["specific problem tied to a real click-through principle", "... up to 6"], "upgrades": [ { "tier": "Basic polish (keep the photo)", "prompt": "..." }, { "tier": "Mild redesign (same person & text, new design)", "prompt": "..." }, { "tier": "Full reimagining (change everything)", "prompt": "..." } ], "headline": "exact main text or empty", "subline": "secondary text or empty", "people": [{ "desc": "appearance", "expression": "excited|shocked|serious|pointing|laughing|love|none" }], "elements": ["only from: ' + BUILDER_ELEMENTS.join(', ') + '"] }',
      TIER_SPEC,
      'Every prompt must be concrete and DETAILED about composition, subject, colour, contrast and text size/placement. Never invent text, people or brands not present. Write in the same language as the thumbnail content.',
    ].filter(Boolean).join('\n\n');
  }

  // Wipe everything from a previous analysis so a new upload starts clean.
  function clearForm() {
    setHeadline(''); setSubline(''); setPeople([]); setElements([]);
    setFeedback([]); setUpgrades([]); setPrompt(''); setBuilt(false);
    setAnalyseSummary(''); setAnalyseDesc('');
  }

  // Cloud check: works free inside Claude (text description) OR with an API key
  // (image vision). Finds what's wrong per the research and writes the fixed prompt.
  async function cloudCheck() {
    if (!canCloud) { setAnalyseState('nokey'); return; }
    if (!analyseImg && !analyseDesc.trim()) { setAnalyseState('needinput'); return; }
    setAnalyseState('loading'); setFeedback([]); setAnalyseSummary('');
    try {
      const userText = (analyseDesc.trim()
        ? 'Thumbnail description from the creator:\n' + analyseDesc.trim()
        : 'Analyse the attached thumbnail image.')
        + (headline.trim() ? '\nKnown headline text: "' + headline.trim() + '"' : '')
        + '\n\nReturn the JSON now.';
      // Only send the image to the vision model when the user has their own key;
      // the free Claude cloud is text-only, so it reads the description instead.
      const images = (hasKey && analyseImg) ? [analyseImg] : [];
      const { text } = await window.callClaude({ system: thumbSystem(), userText, images, maxTokens: 1600 });
      const parsed = JSON.parse((String(text).match(/\{[\s\S]*\}/) || ['null'])[0]);
      if (!parsed) { setAnalyseState('error'); return; }
      // Replace fields unconditionally so a new thumbnail fully overwrites the
      // last one (empty values clear the old text instead of leaving it behind).
      setHeadline(parsed.headline || '');
      setSubline(parsed.subline || '');
      setPeople(Array.isArray(parsed.people) ? parsed.people.slice(0, 10).map(p => ({
        photo: null,
        expression: BUILDER_EXPRESSIONS.find(e => e.id === p.expression) ? p.expression : 'none',
        desc: p.desc || '',
      })) : []);
      setElements(Array.isArray(parsed.elements) ? parsed.elements.filter(e => BUILDER_ELEMENTS.includes(e)) : []);
      setFeedback(Array.isArray(parsed.whatsWrong) ? parsed.whatsWrong.filter(Boolean).slice(0, 6) : []);
      // Three tiers (basic / mild / full). Fall back to a single improvedPrompt if present.
      let ups = Array.isArray(parsed.upgrades) ? parsed.upgrades.filter(u => u && u.prompt).slice(0, 3) : [];
      if (!ups.length && parsed.improvedPrompt) ups = [{ tier: 'Improved version', prompt: String(parsed.improvedPrompt) }];
      setUpgrades(ups);
      if (ups.length) { setPrompt(ups[0].prompt); setBuilt(true); }
      setAnalyseSummary(hasKey && analyseImg ? 'Checked your image with the research.' : 'Checked your description with the research (free cloud).');
      setAnalyseState('done');
      setTimeout(() => document.getElementById('builder-output')?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 140);
    } catch (e) {
      setAnalyseState(String(e && e.message) === 'NO_KEY' ? 'nokey' : 'error');
    }
  }

  async function analyzeRef() {
    const key = window.getKey ? window.getKey() : null;
    if (!key || !refImg) return;
    setRefState('loading');
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: window.getModel ? window.getModel() : 'claude-sonnet-4-6',
          max_tokens: 350,
          system: 'Extract visual design properties. Return ONLY JSON.',
          messages: [{ role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: refImg.mime, data: refImg.data } },
            { type: 'text', text: 'Analyse this thumbnail. Return JSON: { "layout": "...", "colors": "...", "textStyle": "...", "mood": "...", "keyElements": "..." }' },
          ]}],
        }),
      });
      const data = await resp.json();
      const raw = (data.content?.[0]?.text || '').trim();
      const parsed = JSON.parse(raw.match(/\{[\s\S]*\}/)?.[0] || 'null');
      if (parsed) setRefAnalysis(Object.entries(parsed).map(([k, v]) => `${k}: ${v}`).join('\n'));
      setRefState('done');
    } catch (e) { setRefState('error'); }
  }

  function buildPrompt() {
    const lines = [];
    lines.push(`Create a thumbnail image (${currentRatio.label} aspect ratio, ${currentRatio.w}x${currentRatio.h}px).`);
    lines.push('');
    if (people.length > 0) {
      lines.push(`PEOPLE: ${people.length} person${people.length > 1 ? 's' : ''}.`);
      people.forEach((p, i) => {
        const ex = BUILDER_EXPRESSIONS.find(e => e.id === p.expression);
        const exText = ex && ex.id !== 'none' ? `expression: ${ex.label}` : 'natural expression';
        lines.push(`- Person ${i + 1}${p.photo ? ` (see photo ${i + 1})` : ''} -- ${exText}${p.desc.trim() ? `, looks like: ${p.desc.trim()}` : ''}.`);
      });
      lines.push('');
    }
    if (headline.trim() || subline.trim()) {
      lines.push('TEXT ON THUMBNAIL:');
      if (headline.trim()) lines.push(`- Main headline: "${headline.trim()}" -- large, bold, dominant.`);
      if (subline.trim()) lines.push(`- Sub-text: "${subline.trim()}" -- smaller, secondary.`);
      lines.push('');
    }
    if (elements.length > 0) { lines.push(`VISUAL ELEMENTS: ${elements.join('. ')}.`); lines.push(''); }
    // Colour is only added when the user actually set brand colours (or notes).
    // No auto-filled/random palette -- that caused unwanted, off-brand colours.
    if (hasBrand && (refOverride || !refImg)) {
      const colorRoles = brandColors.map((c, i) => {
        const role = i === 0 ? 'Primary/background' : i === 1 ? 'Accent/text' : i === 2 ? 'Secondary accent' : 'Highlight';
        return `${role}: ${c}`;
      });
      const cp = [colorRoles.length ? `MANDATORY palette -- ${colorRoles.join('; ')}.` : '', brand.note ? `Brand notes: ${brand.note}.` : ''].filter(Boolean).join(' ');
      lines.push(`COLOUR (use these exact colours): ${cp} Do not substitute or ignore these.`); lines.push('');
    }
    if (refImg) {
      if (refAnalysis) {
        const al = refOverride && hasBrand ? refAnalysis.split('\n').filter(l => !l.startsWith('colors')).join('\n') : refAnalysis;
        lines.push('STYLE REFERENCE (match this image visual DNA):'); lines.push(al);
        if (refOverride && hasBrand) lines.push('Apply brand colours above instead of reference colours.');
      } else {
        lines.push(`STYLE: Match layout and energy of the attached reference image.${refOverride && hasBrand ? ' Use brand colours above instead.' : ''}`);
      }
      lines.push('');
    }
    if (extraNote.trim()) { lines.push(`ADDITIONAL DIRECTION: ${extraNote.trim()}`); lines.push(''); }
    lines.push('Make it bold, high-contrast, impossible to ignore at small thumbnail size. Professional photography and design quality.');
    const p = lines.join('\n');
    setPrompt(p); setBuilt(true);
    setTimeout(() => document.getElementById('builder-output')?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);
  }

  function openIn(tool) {
    // Route through the shared handoffs (ChatGPT pre-fills via URL; Gemini copies
    // synchronously so the paste actually works).
    if (tool.id === 'chatgpt' && window.openInChatGPT) return window.openInChatGPT(prompt);
    if (tool.id === 'gemini' && window.openInGemini) return window.openInGemini(prompt);
    try { window.copyText && window.copyText(prompt); } catch (e) {}
    if (tool.useQ) window.open(tool.url + '?q=' + encodeURIComponent(prompt.slice(0, 6000)), '_blank', 'noopener,noreferrer');
    else window.open(tool.url, '_blank', 'noopener,noreferrer');
  }

  async function copyPhoto(person, idx) {
    if (!person.photo) return;
    try { await bCopyImageToClipboard(person.photo.preview, person.photo.mime); setCopyFeedback('ok-' + idx); }
    catch (e) { setCopyFeedback('fail-' + idx); }
    setTimeout(() => setCopyFeedback(''), 2200);
  }

  async function copyRefImgFn() {
    try { await bCopyImageToClipboard(refImg.preview, refImg.mime); setCopyFeedback('ref-ok'); }
    catch (e) { setCopyFeedback('ref-fail'); }
    setTimeout(() => setCopyFeedback(''), 2200);
  }

  const photoPeople = people.filter(p => p.photo);

  return (
    <div className="ci-work" style={{ '--ci-accent': m.accentFrom, '--ci-glow': m.accentGlow }}>
      <BWH mood={mood} eyebrow="Prompt Studio" title="Build your thumbnail prompt"
        sub="Check your current thumbnail free (it tells you what's wrong and writes the fix), or build one from scratch -- then send it to ChatGPT or Gemini." />

      {/* CLOUD CHECK -- free, no API key */}
      <BB mood={mood} title="Check & fix my thumbnail" desc="Runs free inside Claude -- no API key. Describe your current thumbnail (or upload it if you have an API key for image vision). It finds what's wrong using the research and writes the fixed prompt below.">
        {analyseImg && (
          <div style={{ display: 'flex', gap: 12, alignItems: 'center', marginBottom: 12 }}>
            <img src={analyseImg.preview} alt="" style={{ width: 120, borderRadius: 9, border: '1px solid var(--stroke-1)', flexShrink: 0 }} />
            <button className="ci-copybtn" style={{ height: 30, fontSize: 11.5 }}
              onClick={() => { setAnalyseImg(null); clearForm(); setAnalyseState('idle'); }}>Remove image</button>
          </div>
        )}
        {!analyseImg && (
          <label className="ci-drop" style={{ minHeight: 72, flexDirection: 'row', gap: 8, cursor: 'pointer', padding: 12, marginBottom: 10 }}>
            <input type="file" accept="image/*" style={{ display: 'none' }}
              onChange={e => e.target.files[0] && bReadImage(e.target.files[0], img => { clearForm(); setAnalyseState('idle'); setAnalyseImg(img); })} />
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.6"/><path d="M3 16l5-5 4 4 3-3 6 6"/></svg>
            <span style={{ fontSize: 12.5 }}>Upload your thumbnail <span style={{ color: 'var(--text-5)' }}>(optional -- only read with an API key)</span></span>
          </label>
        )}
        <label className="ci-label">Describe your current thumbnail</label>
        <textarea className="ci-textarea" style={{ minHeight: 80 }} value={analyseDesc} onChange={e => setAnalyseDesc(e.target.value)}
          placeholder="e.g. My face on the right looking normal, big white text 'NEW PHONE' on a grey background, phone in my hand on the left." />
        <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap', marginTop: 12 }}>
          <window.GlowButton mood={mood} onClick={cloudCheck} style={{ opacity: analyseState === 'loading' ? 0.65 : 1 }}>
            {analyseState === 'loading' ? 'Checking...' : analyseState === 'done' ? 'Check again' : (hasKey && analyseImg ? 'Check my image (free)' : 'Check & fix it (free)')}
          </window.GlowButton>
          {analyseState === 'loading' && <span style={{ fontSize: 12, color: 'var(--text-4)' }}>Reading the research...</span>}
          {analyseState === 'done' && <span style={{ fontSize: 12, color: '#8FD86A' }}>{analyseSummary}</span>}
          {analyseState === 'error' && <span style={{ fontSize: 12, color: '#f5788c' }}>Couldn't read the result -- try again.</span>}
          {analyseState === 'needinput' && <span style={{ fontSize: 12, color: '#F0C85A' }}>Describe or upload your thumbnail first.</span>}
        </div>
        {analyseState === 'nokey' && (

            To check for free, open this app inside <b>Claude.ai</b> (it uses Claude's cloud, no key). Or add your own API key in Settings.
          </div>

        {feedback.length > 0 && (
          <div style={{ marginTop: 14 }}>

                  <span>{f}</span>

            </div>
            <div style={{ fontSize: 12, color: 'var(--text-4)', marginTop: 10 }}>The fixed prompt is ready below -- send it to ChatGPT or Gemini.</div>

      {/* ASPECT RATIO */}

              style={{ height: 36, padding: '0 18px', fontFamily: 'var(--font-mono)', fontSize: 13.5, fontWeight: 700,
                background: ratio === r.id ? `${m.accentFrom}1a` : 'transparent',
                borderColor: ratio === r.id ? m.accentGlow : 'var(--stroke-1)',
                color: ratio === r.id ? m.accentFrom : 'var(--text-3)' }}>
              {r.label}

          ))}
        </div>
        <div style={{ marginTop: 7, fontSize: 11.5, color: 'var(--text-5)' }}>{currentRatio.w} x {currentRatio.h} px</div>
      </BB>

          {people.map((p, i) => (
            <div key={i} style={{ display: 'flex', gap: 10, alignItems: 'flex-start', padding: '10px 12px', borderRadius: 10, background: 'var(--inset)', border: '1px solid var(--stroke-1)' }}>
              <div style={{ flexShrink: 0 }}>

                  <div style={{ position: 'relative', width: 58 }}>
                    <img src={p.photo.preview} alt="" style={{ width: 58, height: 58, objectFit: 'cover', borderRadius: 8, display: 'block', border: '1px solid var(--stroke-1)' }} />
                    <button onClick={() => clearPersonPhoto(i)}
                      style={{ position: 'absolute', top: -5, right: -5, width: 16, height: 16, borderRadius: '50%', border: 'none', background: 'var(--inset)', color: '#fff', fontSize: 8, cursor: 'pointer', lineHeight: '16px', textAlign: 'center', padding: 0 }}>x</button>
                  </div>
                ) : (
                  <label style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', width: 58, height: 58, borderRadius: 8, border: '1.5px dashed var(--stroke-2)', cursor: 'pointer', color: 'var(--text-5)', gap: 2, background: 'rgba(255,255,255,0.02)' }}>
                    <input type="file" accept="image/*" style={{ display: 'none' }} onChange={e => e.target.files[0] && setPersonPhoto(i, e.target.files[0])} />

              </div>
              <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 6 }}>
                <div style={{ fontSize: 10.5, fontWeight: 700, color: m.accentFrom, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Person {i + 1}</div>
                <input className="ci-input" style={{ fontSize: 12 }} value={p.desc} onChange={e => setPersonDesc(i, e.target.value)}
                  placeholder="Describe appearance -- e.g. man in 30s, brown hair, glasses" />
                <select className="ci-input" style={{ fontSize: 12, height: 30, padding: '0 6px', appearance: 'auto' }}
                  value={p.expression} onChange={e => setPersonExpr(i, e.target.value)}>

<script type="text/babel" data-presets="react">
/* ===== ci-playbook.jsx ===== */
// ContentIntel — Thumbnail Playbook (public page).
// Renders the thumbnail research library (design principles, layout archetypes,
// colour schemes, per-niche proven patterns, example regen prompts, A/B tests)
// as a browsable, on-brand guide. Data comes from research.js, so it stays in
// sync with whatever the owner trains.

// Map a colour-scheme name to a representative CSS swatch.
function schemeSwatch(name) {
  const M = {
    'Sky-blue growth': 'linear-gradient(135deg,#7cc6ff,#1e6fd6)',
    'Navy grid + growth graph': 'linear-gradient(135deg,#0b1f3a,#1f9d6b)',
    'Stock-chart green/red': 'linear-gradient(135deg,#19c37d,#e23b3b)',
    'Brand-matched': 'conic-gradient(from 210deg,#ff5e3a,#ffd400,#19c37d,#2bd2ff,#7b61ff,#ff5e3a)',
    'High-contrast complementary': 'linear-gradient(135deg,#ff7a3c,#1fb6c9)',
    'Bold saturated primary': 'linear-gradient(135deg,#ff3b30,#ffd400 55%,#2b6cff)',
    'Dark + neon accent': 'linear-gradient(135deg,#0a0a12,#39ff14)',
    'Bright + white space': 'linear-gradient(135deg,#ffffff,#dfe7f5)',
    'Warm dramatic': 'linear-gradient(135deg,#ff5e3a,#b3001b)',
    'Cool / tech': 'linear-gradient(135deg,#2bd2ff,#1455c4)',
    'Monochrome + single accent': 'linear-gradient(135deg,#2a2a2a,#9aa0a6 70%,#ff3b30)',
    'Dark premium / photographic': 'linear-gradient(135deg,#0c0f16,#3a4356)',
  };
  return M[name] || 'linear-gradient(135deg,#3a3f4a,#8a93a6)';
}

// Split provenPatterns (one string, blocks separated by blank lines) into
// { title, body } cards. First line = heading.
function splitPlaybook(text) {
  return String(text || '').split(/\n\s*\n/).map(b => b.trim()).filter(Boolean).map(block => {
    const nl = block.indexOf('\n');
    return nl === -1 ? { title: block, body: '' } : { title: block.slice(0, nl).trim(), body: block.slice(nl + 1).trim() };
  });
}

const PLAYBOOK_REGEN_EXAMPLES = [
  {
    label: 'Business case-study',
    text: "Improve THIS thumbnail: keep the founder photo, cut them out cleanly on the right third with rim light, smiling at camera. Background: the company's real storefront on a bright sky-blue sky with a faint upward green growth line. Bottom-left, two lines: '₹900 Crore' in big serif-italic white + 'Cloud Kitchen Factory' in bold sans. Draw a hand-drawn curved white arrow from the number to the founder. Add a small black '100K+ VIEWS' pill top-right. Keep the real brand logo as a tilted badge near the subject.",
  },
  {

    text: "Improve THIS thumbnail: expert guest cut out on the left, host on the right, podcast mics in front, dark navy background with a faint market chart. Centre-top: 'You Only Need This' in white, then '1 FUND!' in a yellow highlight pill (black text), then 'To Retire Early'. Add a small 'HOW?' reaction box beside the host and a curved arrow. Keep both real faces and the real claim.",

// Schematic wireframe of a layout archetype — shows where the subject, text,
// arrow, chart etc. sit. Pure SVG so it stays in the single-file app.
function LayoutDiagram({ name }) {
  const A = '#FF6B4A', A2 = '#FFB07A', TX = '#454b5a', HL = '#cfd5e2', BG = '#0f131b';
  const n = (name || '').toLowerCase();
  const W = 320, H = 180;
  const face = (x, y, w, h) => (<g><rect x={x} y={y + h * 0.44} width={w} height={h * 0.56} rx={6} fill={A} opacity="0.85" /><circle cx={x + w / 2} cy={y + h * 0.32} r={h * 0.26} fill={A2} /></g>);
  const bars = (x, y, w, arr) => arr.map((bw, i) => <rect key={i} x={x} y={y + i * 13} width={w * bw} height={i === 0 ? 10 : 6} rx={3} fill={i === 0 ? HL : TX} />);
  const arrow = (d) => <path d={d} fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" markerEnd="url(#ah)" />;
  const chart = (c) => <polyline points="20,150 65,122 105,134 150,92 200,108 250,64 300,84" fill="none" stroke={c || A} strokeWidth="3" strokeLinejoin="round" />;
  const panel = (x, w, c) => <rect x={x} y={18} width={w} height={144} rx={6} fill={c} />;

  let body;

    body = <>{face(18, 38, 96, 116)}{face(206, 38, 96, 116)}<text x={160} y={104} fill="#fff" fontFamily="var(--font-display)" fontWeight="800" fontSize="26" textAnchor="middle">VS</text></>;
  else if (n.includes('full-bleed')) body = <>{face(92, 12, 136, 172)}{bars(118, 150, 90, [0.8])}</>;
  else if (n.includes('chart') || n.includes('data-viz')) body = <>{chart()}{face(220, 60, 84, 110)}{bars(20, 30, 120, [0.9, 0.6])}</>;
  else if (n.includes('triptych') || n.includes('3-panel')) body = <>{panel(14, 92, '#22405f')}{panel(114, 92, '#3a2a55')}{panel(214, 92, '#5a2a2a')}<text x={160} y={170} fill={TX} fontFamily="var(--font-mono)" fontSize="11" textAnchor="middle">A · B · C</text></>;
  else if (n.includes('before') || n.includes('after')) body = <><rect x={14} y={18} width={142} height={144} rx={6} fill="#23303f" /><rect x={164} y={18} width={142} height={144} rx={6} fill="#5a2a2a" />{bars(28, 130, 70, [0.7])}{bars(178, 130, 70, [0.7])}</>;
  else if (n.includes('text-dominant')) body = <>{bars(40, 56, 240, [1, 0.85, 0.6])}</>;
  else if (n.includes('product') || n.includes('object hero')) body = <><circle cx={160} cy={86} r={48} fill={A2} /><rect x={132} y={140} width={56} height={10} rx={3} fill={HL} /></>;

  else if (n.includes('annotated') || n.includes('arrow')) body = <>{face(196, 36, 100, 120)}<circle cx={120} cy={70} r={28} fill="none" stroke={A} strokeWidth="3" />{arrow('M120,98 C130,130 160,130 188,108')}</>;
  else if (n.includes('scene') || n.includes('establishing')) body = <><rect x={14} y={18} width={292} height={92} rx={6} fill="#2a3a4f" /><rect x={14} y={110} width={292} height={52} rx={6} fill="#1b2735" />{bars(28, 128, 90, [0.7])}</>;
  else if (n.includes('map') || n.includes('geo') || n.includes('series')) body = <><polygon points="40,40 90,30 110,70 95,120 55,135 30,90" fill="#2a405f" stroke={A} strokeWidth="2" />{face(210, 44, 92, 112)}{bars(150, 30, 120, [0.9])}</>;
  else if (n.includes('interview') || n.includes('host')) body = <>{face(40, 36, 96, 110)}{face(186, 36, 96, 110)}<rect x={78} y={150} width={6} height={22} rx={3} fill={TX} /><rect x={232} y={150} width={6} height={22} rx={3} fill={TX} />{bars(120, 26, 80, [0.8])}</>;
  else if (n.includes('cinematic') || n.includes('editorial')) body = <><rect x={14} y={18} width={292} height={144} rx={8} fill="#0b0e14" />{face(120, 22, 80, 150)}{bars(120, 150, 80, [0.6])}</>;
  else if (n.includes('founder') || n.includes('brand scene')) body = <><rect x={14} y={18} width={292} height={144} rx={6} fill="#1d2a3d" />{chart('#9fb4d8')}{face(206, 40, 96, 116)}{badge(150, 70)}{arrow('M70,150 C100,140 140,135 168,118')}{bars(24, 120, 110, [1, 0.7])}</>;
  else // Face + Text split (default)
    body = <>{face(196, 22, 110, 150)}{bars(28, 60, 140, [1, 0.8, 0.55])}</>;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: 'block', borderRadius: 10, border: '1px solid var(--stroke-1)' }}>
      <defs><marker id="ah" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#fff" /></marker></defs>
      <rect x="0" y="0" width={W} height={H} rx="12" fill={BG} />
      {body}
    </svg>
  );
}
