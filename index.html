<script type="text/babel" data-presets="react">
/* ===== ci-research.jsx ===== */
// ContentIntel — Research editor (admin-only). Edits the in-memory research,
// previews it live, and exports an updated research.js to commit.
//
// HONEST NOTE: on a static site this gate is obscurity-level — anyone can read
// the source. The REAL protection is that the live site only changes when YOU
// commit research.js. The editor here just hides the UI from normal visitors
// and lets you produce the file without hand-editing JSON.

const LS_ADMIN = "ci_admin";
function isAdmin() {
  try {
    if (localStorage.getItem(LS_ADMIN) === "1") return true;
    const p = new URLSearchParams(location.search).get("admin");
    if (p && p === window.ADMIN_PASS) { localStorage.setItem(LS_ADMIN, "1"); return true; }
  } catch (e) {}
  return false;
}
function promptAdmin() {
  const p = window.prompt("Research editor passphrase:");
  if (p === window.ADMIN_PASS) { try { localStorage.setItem(LS_ADMIN, "1"); } catch (e) {} return true; }
  if (p != null) window.alert("Wrong passphrase.");
  return false;
}
function exitAdmin() { try { localStorage.removeItem(LS_ADMIN); } catch (e) {} }

// current research = override (edited) or the file's window.CI_RESEARCH
function currentResearch() {
  return window.__CI_RESEARCH_OVERRIDE || window.CI_RESEARCH || {};
}
function serializeResearch(obj) {
  return "/* ContentIntel research data — generated by the in-app Research editor.\n" +
    "   Commit this file and redeploy; the app code does not change. */\n\n" +
    "window.CI_RESEARCH = " + JSON.stringify(obj, null, 2) + ";\n";
}

function ResearchTab({ onClose, onNav }) {
  const mood = "navy";
  const m = window.MOODS[mood];
  const SECTIONS = ["core", "script", "thumbnail", "title", "ads"];
  const LABELS = { core: "Global · all checks", script: "Script", thumbnail: "Thumbnail", title: "Title", ads: "Ads" };

  const [data, setData] = React.useState(() => JSON.parse(JSON.stringify(currentResearch())));
  const [active, setActive] = React.useState("core");
  const [priv, setPriv] = React.useState(window.hasLocalResearch());
  const [raw, setRaw] = React.useState(false);
  const [rawText, setRawText] = React.useState("");
  const [msg, setMsg] = React.useState("");

  const seg = data[active] || {};

  function setField(type, field, value) {
    setData(d => ({ ...d, [type]: { ...(d[type] || {}), [field]: value } }));
  }
  function setRubric(type, idx, key, value) {
    setData(d => {
      const rub = [...((d[type] || {}).rubric || [])];
      rub[idx] = { ...rub[idx], [key]: value };
      return { ...d, [type]: { ...(d[type] || {}), rubric: rub } };
    });
  }
  function addRubric(type) {
    setData(d => ({ ...d, [type]: { ...(d[type] || {}), rubric: [...((d[type] || {}).rubric || []), { name: "New dimension", what: "" }] } }));
  }
  function delRubric(type, idx) {
    setData(d => ({ ...d, [type]: { ...(d[type] || {}), rubric: ((d[type] || {}).rubric || []).filter((_, i) => i !== idx) } }));
  }

  function savePrivate() {
    let next = data;
    if (raw) {
      try { next = JSON.parse(rawText); setData(next); } catch (e) { setMsg("Invalid JSON: " + e.message); return; }
    }
    window.saveLocalResearch(next);
    setPriv(true);
    setMsg("Saved privately to this browser — your analyses use it now. Other visitors are unaffected until you Download + redeploy.");
    setTimeout(() => setMsg(""), 5000);
  }
  function clearPrivate() {
    window.clearLocalResearch();
    setData(JSON.parse(JSON.stringify(window.CI_RESEARCH || {})));
    setPriv(false);
    setMsg("Cleared your private draft — back to the published research.js.");
    setTimeout(() => setMsg(""), 4000);
  }
  function download() {
    const obj = raw ? safeParse(rawText) : data;
    if (!obj) { setMsg("Fix the JSON before downloading."); return; }
    const blob = new Blob([serializeResearch(obj)], { type: "text/javascript" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "research.js"; a.click();
    URL.revokeObjectURL(url);
    setMsg("Downloaded research.js — commit it to your repo and redeploy.");
    setTimeout(() => setMsg(""), 4000);
  }
  function safeParse(t) { try { return JSON.parse(t); } catch (e) { return null; } }
  function toggleRaw() {
    if (!raw) setRawText(JSON.stringify(data, null, 2));
    else { const o = safeParse(rawText); if (o) setData(o); }
    setRaw(r => !r);
  }

  return (
    <div className="ci-work wide" style={{ "--ci-accent": m.accentFrom, "--ci-glow": m.accentGlow }}>
      <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: 18, flexWrap: "wrap", gap: 12 }}>
        <div>
          <Eyebrow mood={mood} glow>Admin · research {priv && "· private draft active"}</Eyebrow>
          <h2 className="ci-h2">Improve the research</h2>
          <p className="ci-sub" style={{ marginTop: 8 }}>
            Your private editing surface — invisible to anyone you share the link with. Add findings anytime; <b>Save (private)</b> keeps them in your browser and uses them in your own analyses straight away. When you want everyone to benefit, <b>Download research.js</b>, commit it and redeploy. The app code never changes.
          </p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {onNav && <button className="ci-copybtn" style={{ height: 34 }} onClick={() => onNav("train")}>🧠 Train from thumbnails →</button>}
          <button className="ci-copybtn" style={{ height: 34 }} onClick={toggleRaw}>{raw ? "Form view" : "Raw JSON"}</button>
          <button className="ci-copybtn" style={{ height: 34 }} onClick={() => { exitAdmin(); onClose(); }}>Lock & exit</button>
        </div>
      </div>

      <div className="ci-block" style={{ display: "flex", alignItems: "flex-start", gap: 12, marginBottom: 14, padding: "12px 16px" }}>
        <span className="ci-dot yellow" style={{ marginTop: 4 }} />
        <span style={{ fontSize: 12.5, color: "var(--text-3)", lineHeight: 1.5 }}>
          <b>How privacy works:</b> the Research tab + lock icon are hidden from normal visitors (they appear only after you unlock via <code>?admin=…</code> on your own browser). Drafts you <b>Save (private)</b> live only in your browser and never reach other users. Only <b>Download research.js → commit</b> publishes to everyone. Note: once published, research.js ships to the browser, so don't store secrets here — it's evaluation methodology, not credentials.
        </span>
      </div>

      {!raw ? (
        <>
          <div className="ci-chiprow" style={{ marginBottom: 14 }}>
            {SECTIONS.map(t => (
              <button key={t} className={"pill" + (active === t ? " active" : "")} onClick={() => setActive(t)} style={{ height: 32 }}>{LABELS[t]}</button>
            ))}
          </div>

          {active === "core" ? (
            <Block title="Global research context" desc="Shared by EVERY check — the universal attention/virality science + how to adapt to any language, region and niche. This is prepended to every analysis." mood={mood}>
              <textarea className="ci-textarea" style={{ minHeight: 380, fontFamily: "var(--font-mono)", fontSize: 12.5, lineHeight: 1.6 }}
                value={data.core || ""} onChange={e => setData(d => ({ ...d, core: e.target.value }))}
                placeholder="Paste the research that should inform all four checks…" />
            </Block>
          ) : (
          <>
          <Block title={`${LABELS[active]} · methodology`} desc="This becomes Claude's evaluation framework for this specific check." mood={mood}>
            <textarea className="ci-textarea" style={{ minHeight: 260, fontFamily: "var(--font-mono)", fontSize: 12.5, lineHeight: 1.6 }}
              value={seg.systemGuidance || ""} onChange={e => setField(active, "systemGuidance", e.target.value)}
              placeholder="Frameworks, data points, do's and don'ts, examples…" />
          </Block>

          <Block title={`${LABELS[active]} · scoring rubric`} desc="The dimensions Claude grades 0–100" mood={mood}
            right={<button className="ci-copybtn" style={{ height: 28 }} onClick={() => addRubric(active)}>+ Add</button>}>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {(seg.rubric || []).map((r, i) => (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "180px 1fr 30px", gap: 10, alignItems: "start" }}>
                  <input className="ci-input" value={r.name || ""} onChange={e => setRubric(active, i, "name", e.target.value)} placeholder="Dimension" />
                  <input className="ci-input" value={r.what || ""} onChange={e => setRubric(active, i, "what", e.target.value)} placeholder="What it measures" />
                  <button className="ci-copybtn" style={{ height: 44, padding: "0 9px" }} onClick={() => delRubric(active, i)}>✕</button>
                </div>
              ))}
            </div>
          </Block>

          <Block title={`${LABELS[active]} · extra notes`} mood={mood}>
            <input className="ci-input" value={seg.notes || ""} onChange={e => setField(active, "notes", e.target.value)} placeholder="Optional extra instruction appended to the prompt" />
          </Block>
          </>
          )}
        </>
      ) : (
        <Block title="Raw research JSON" desc="Edit the whole object directly" mood={mood}>
          <textarea className="ci-textarea" style={{ minHeight: 460, fontFamily: "var(--font-mono)", fontSize: 12, lineHeight: 1.55 }}
            value={rawText} onChange={e => setRawText(e.target.value)} spellCheck={false} />
        </Block>
      )}

      <div style={{ display: "flex", alignItems: "center", gap: 14, marginTop: 16, flexWrap: "wrap" }}>
        <GlowButton mood={mood} onClick={savePrivate}>Save (private to this browser)</GlowButton>
        <GlowButton mood="burgundy" onClick={download}>↓ Download research.js (publish to all)</GlowButton>
        {priv && <button className="ci-copybtn" style={{ height: 38 }} onClick={clearPrivate}>Clear private draft</button>}
        {msg && <span style={{ fontSize: 12.5, color: "var(--text-2)", maxWidth: 360, lineHeight: 1.4 }}>{msg}</span>}
      </div>
    </div>
  );
}

Object.assign(window, { isAdmin, promptAdmin, exitAdmin, ResearchTab });
</script>
<script type="text/babel" data-presets="react">
/* ===== ci-train.jsx ===== */
// ContentIntel — Train from thumbnails (admin-only).
// Drop up to 500 reference thumbnails → batched vision analysis → aggregate the
// design patterns → synthesize an updated playbook → merge into the research
// library (private draft). The owner then Downloads research.js to publish.
//
// Requires an Anthropic API key (vision). The free preview AI cannot see images.

const TRAIN_MAX = 500;
const TRAIN_DOWNSCALE_W = 640; // thumbnails are judged small; downscale to cut tokens/cost/memory

// Read a file → downscaled JPEG { mime, data(base64), preview, name }
function trainReadImage(file) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onerror = () => reject(new Error("read failed"));
    fr.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("decode failed"));
      img.onload = () => {
        const scale = Math.min(1, TRAIN_DOWNSCALE_W / (img.width || TRAIN_DOWNSCALE_W));
        const w = Math.max(1, Math.round((img.width || TRAIN_DOWNSCALE_W) * scale));
        const h = Math.max(1, Math.round((img.height || TRAIN_DOWNSCALE_W) * scale));
        const c = document.createElement("canvas"); c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        const url = c.toDataURL("image/jpeg", 0.82);
        resolve({ mime: "image/jpeg", data: url.split(",")[1] || "", preview: url, name: file.name });
      };
      img.src = fr.result;
    };
    fr.readAsDataURL(file);
  });
}

// Limited-concurrency pool. Errors are captured per item, never thrown.
async function trainPool(items, worker, concurrency, onProgress) {
  let idx = 0, done = 0;
  const results = new Array(items.length);
  async function next() {
    const i = idx++;
    if (i >= items.length) return;
    try { results[i] = await worker(items[i], i); }
    catch (e) { results[i] = { __error: String(e && e.message || e) }; }
    onProgress(++done, items.length);
    return next();
  }
  await Promise.all(Array.from({ length: Math.min(concurrency, items.length) }, next));
  return results;
}

function trainParseLoose(text) {
  let t = (text || "").trim();
  const fence = t.match(/```(?:json)?\s*([\s\S]*?)```/i); if (fence) t = fence[1].trim();
  const s = Math.min(...["[", "{"].map(c => { const k = t.indexOf(c); return k < 0 ? 1e9 : k; }));
  const e = Math.max(t.lastIndexOf("]"), t.lastIndexOf("}"));
  if (s < 1e9 && e !== -1) t = t.slice(s, e + 1);
  try { return JSON.parse(t); } catch (e1) {
    try { return JSON.parse(t.replace(/,\s*([}\]])/g, "$1")); } catch (e2) { return null; }
  }
}

// ── Aggregate per-image records into frequency stats ─────────────────────────
function trainAggregate(records, niche) {
  const ok = records.filter(r => r && !r.__error && typeof r === "object");
  const tally = {};
  const bump = (k, v) => { if (v == null || v === "") return; (tally[k] = tally[k] || {})[v] = (tally[k][v] || 0) + 1; };
  let faces = 0, arrows = 0, numHooks = 0, wordSum = 0, wordN = 0;
  const powerWords = {}, badges = {}, hooks = [];
  ok.forEach(r => {
    bump("layout", r.layout); bump("colorScheme", r.colorScheme); bump("faceExpression", r.faceExpression);
    if (r.hasFace) faces++; if (r.hasArrow) arrows++;
    if (r.numberHook && String(r.numberHook).toLowerCase() !== "none") numHooks++;
    if (typeof r.wordCount === "number") { wordSum += r.wordCount; wordN++; }
    (r.powerWords || []).forEach(w => { if (w) powerWords[w] = (powerWords[w] || 0) + 1; });
    (r.badges || []).forEach(b => { if (b) badges[b] = (badges[b] || 0) + 1; });
    if (r.textHook) hooks.push(r.textHook);
  });
  const n = ok.length || 1;
  const top = (obj, k = 8) => Object.entries(obj).sort((a, b) => b[1] - a[1]).slice(0, k);
  return {
    niche, n: ok.length, errors: records.length - ok.length,
    layouts: top(tally.layout || {}), colorSchemes: top(tally.colorScheme || {}),
    faceExpressions: top(tally.faceExpression || {}),
    withFacePct: Math.round((faces / n) * 100), withArrowPct: Math.round((arrows / n) * 100),
    numberHookPct: Math.round((numHooks / n) * 100), avgWordCount: wordN ? +(wordSum / wordN).toFixed(1) : null,
    powerWords: top(powerWords, 12), badges: top(badges, 6), sampleHooks: hooks.slice(0, 24),
  };
}

// ── Component ────────────────────────────────────────────────────────────────
function TrainTab({ onClose, onNav, onOpenKey }) {
  const mood = "violet";
  const m = window.MOODS[mood];
  const TLib = window.getResearch("thumbnail") || {};
  const layoutNames = (TLib.layouts || []).map(x => x.name);
  const schemeNames = (TLib.colorSchemes || []).map(x => x.name);

  const [files, setFiles] = React.useState([]);     // {mime,data,preview,name}
  const [niche, setNiche] = React.useState("Business / startup case-study (Indian)");
  const [notes, setNotes] = React.useState("");
  const [batch, setBatch] = React.useState(6);
  const [phase, setPhase] = React.useState("idle"); // idle|reading|running|synth|done|error
  const [prog, setProg] = React.useState({ done: 0, total: 0 });
  const [stats, setStats] = React.useState(null);
  const [synth, setSynth] = React.useState(null);   // {summary, provenPatterns, designPrinciples, layoutsToAdd, colorSchemesToAdd}
  const [append, setAppend] = React.useState(true);
  const [err, setErr] = React.useState("");
  const [msg, setMsg] = React.useState("");

  const hasKey = !!window.getKey();
  const estCost = window.estCost(files.length * 1300 + 1200, files.length * 40 + 1500, window.getModel());

  async function onPick(fileList) {
    const arr = Array.from(fileList || []).slice(0, TRAIN_MAX);
    setErr(""); setPhase("reading"); setProg({ done: 0, total: arr.length });
    const out = [];
    for (let i = 0; i < arr.length; i++) {
      try { out.push(await trainReadImage(arr[i])); } catch (e) {}
      setProg({ done: i + 1, total: arr.length });
    }
    setFiles(out); setPhase("idle");
  }

  function classifySystem() {
    return [
      "You are a precise thumbnail DESIGN ANALYST. You receive one or more images labelled Image 1, Image 2, …",
      "For EACH image, extract its design features. Classify `layout` and `colorScheme` using ONLY one of the allowed names below, or \"other\" if none fit.",
      "ALLOWED LAYOUTS: " + (layoutNames.join(" | ") || "(none)"),
      "ALLOWED COLOUR SCHEMES: " + (schemeNames.join(" | ") || "(none)"),
      'Return ONLY a JSON array (no markdown, no prose), one object per image in order:',
      '[{"i":1,"layout":"<name|other>","colorScheme":"<name|other>","textHook":"<main on-image text, verbatim, or empty>","wordCount":<int>,"hasFace":true,"faceCount":<int>,"faceExpression":"<smiling|shock|serious|neutral|none>","hasArrow":true,"badges":["100K+ VIEWS"],"powerWords":["King"],"numberHook":"<e.g. 900 Crore | $10,000 | none>","notes":"<one short phrase>"}]',
      "Be literal about what is visible. Do not invent text that is not there.",
    ].join("\n");
  }

  async function start() {
    if (!hasKey) { setErr("Bulk training needs your own Anthropic API key (the free preview AI can't see images). Add it in Settings."); return; }
    if (!files.length) { setErr("Add some thumbnails first."); return; }
    setErr(""); setStats(null); setSynth(null); setPhase("running");
    // chunk into groups
    const chunks = [];
    for (let i = 0; i < files.length; i += batch) chunks.push(files.slice(i, i + batch));
    let imagesDone = 0; setProg({ done: 0, total: files.length });
    const sys = classifySystem();
    const chunkResults = await trainPool(chunks, async (chunk) => {
      const { text } = await window.callClaude({
        system: sys,
        userText: `Analyze these ${chunk.length} thumbnail(s). Niche/context: ${niche || "(unspecified)"}. Return the JSON array.`,
        images: chunk, maxTokens: 220 * chunk.length + 400,
      });
      const arr = trainParseLoose(text);
      return Array.isArray(arr) ? arr : (arr ? [arr] : []);
    }, 2, (d) => { /* per-chunk */ });
    // flatten, tracking progress by images
    const records = [];
    chunkResults.forEach((res, ci) => {
      const chunk = chunks[ci];
      if (res && res.__error) { chunk.forEach(() => records.push({ __error: res.__error })); }
      else { const a = res || []; chunk.forEach((f, k) => records.push(Object.assign({ name: f.name }, a[k] || { __error: "no record" }))); }
      imagesDone += chunk.length; setProg({ done: imagesDone, total: files.length });
    });
    const agg = trainAggregate(records, niche);
    setStats(agg);
    // synthesize
    setPhase("synth");
    try {
      const synthSys = [
        "You are a thumbnail STRATEGIST. From aggregated feature statistics of analyzed TOP-PERFORMING thumbnails in a niche, write updated research that another AI will use to score and regenerate thumbnails in that niche.",
        "Base everything ONLY on the stats provided; cite the key frequencies (e.g. 'face in 80%'). Be concrete and directly actionable.",
        'Return ONLY JSON: {"summary":"2-3 sentences","provenPatterns":"a niche-scoped playbook: layout, colours, text/number formula, power words, badges, tone — numbered, directly usable","designPrinciples":"6-10 bullet lines","layoutsToAdd":[{"name":"","what":""}],"colorSchemesToAdd":[{"name":"","what":""}]}',
        "layoutsToAdd / colorSchemesToAdd: ONLY archetypes/schemes that recur in the stats but are NOT already in this list — else return empty arrays. Existing layouts: " + (layoutNames.join(" | ")) + ". Existing schemes: " + (schemeNames.join(" | ")) + ".",
      ].join("\n");
      const { text } = await window.callClaude({
        system: synthSys,
        userText: "Niche: " + niche + "\nOwner notes (e.g. which were winners): " + (notes || "(none)") + "\n\nAGGREGATED STATS (JSON):\n" + JSON.stringify(agg, null, 2),
        maxTokens: 1600,
      });
      const obj = trainParseLoose(text) || {};
      setSynth({
        summary: obj.summary || "",
        provenPatterns: obj.provenPatterns || "",
        designPrinciples: obj.designPrinciples || "",
        layoutsToAdd: Array.isArray(obj.layoutsToAdd) ? obj.layoutsToAdd : [],
        colorSchemesToAdd: Array.isArray(obj.colorSchemesToAdd) ? obj.colorSchemesToAdd : [],
      });
      setPhase("done");
    } catch (e) { setErr("Synthesis failed: " + (e.message || e)); setPhase("error"); }
  }

  function mergeByName(existing, additions) {
    const out = [...(existing || [])];
    (additions || []).forEach(a => { if (a && a.name && !out.some(x => x.name === a.name)) out.push({ name: a.name, what: a.what || "" }); });
    return out;
  }
  function saveToResearch() {
    if (!synth) return;
    const cur = JSON.parse(JSON.stringify(window.__CI_RESEARCH_OVERRIDE || window.CI_RESEARCH || {}));
    cur.thumbnail = cur.thumbnail || {};
    const stamp = `\n\n— ${niche} (n=${stats ? stats.n : files.length}, trained ${new Date().toISOString().slice(0, 10)}) —\n`;
    cur.thumbnail.provenPatterns = append && cur.thumbnail.provenPatterns
      ? (cur.thumbnail.provenPatterns + "\n" + stamp + synth.provenPatterns)
      : (stamp.trim() + "\n" + synth.provenPatterns);
    if (synth.designPrinciples) cur.thumbnail.designPrinciples = synth.designPrinciples;
    cur.thumbnail.layouts = mergeByName(cur.thumbnail.layouts, synth.layoutsToAdd);
    cur.thumbnail.colorSchemes = mergeByName(cur.thumbnail.colorSchemes, synth.colorSchemesToAdd);
    window.saveLocalResearch(cur);
    setMsg("Merged into your private research draft — your thumbnail analyses use it now. Open Research → Download research.js to publish to everyone.");
    setTimeout(() => setMsg(""), 7000);
  }

  const busy = phase === "reading" || phase === "running" || phase === "synth";
  const pct = prog.total ? Math.round((prog.done / prog.total) * 100) : 0;

  return (
    <div className="ci-work wide" style={{ "--ci-accent": m.accentFrom, "--ci-glow": m.accentGlow }}>
      <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: 18, flexWrap: "wrap", gap: 12 }}>
        <div>
          <Eyebrow mood={mood} glow>Admin · train</Eyebrow>
          <h2 className="ci-h2">Train from thumbnails</h2>
          <p className="ci-sub" style={{ marginTop: 8, maxWidth: 680 }}>
            Drop up to {TRAIN_MAX} reference thumbnails (ideally proven top-performers in one niche). The app analyses them in batches with image vision, aggregates the design patterns, and writes an updated playbook into your research library.
          </p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {onNav && <button className="ci-copybtn" style={{ height: 34 }} onClick={() => onNav("research")}>Open Research →</button>}
          <button className="ci-copybtn" style={{ height: 34 }} onClick={onClose}>Exit</button>
        </div>
      </div>

      {!hasKey && (
        <div className="ci-block" style={{ marginBottom: 14, border: "1px solid rgba(240,200,90,0.3)", background: "rgba(240,200,90,0.07)" }}>
          <b style={{ fontSize: 13.5 }}>Bulk training needs your API key.</b>
          <div style={{ fontSize: 13, color: "var(--text-2)", marginTop: 6, lineHeight: 1.5 }}>
            Image vision only works on your own Anthropic key (the free preview AI is text-only). <button className="ci-copybtn" style={{ height: 30, marginLeft: 6 }} onClick={onOpenKey}>Open Settings</button>
          </div>
        </div>
      )}

      <Block title="1 · Reference thumbnails" mood={mood}>
        <label htmlFor="train-drop" className="ci-drop" style={{ minHeight: 120, flexDirection: "column", gap: 8, cursor: "pointer" }}>
          <input id="train-drop" type="file" accept="image/*" multiple style={{ display: "none" }} onChange={e => onPick(e.target.files)} />
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4"><rect x="3" y="4" width="18" height="16" rx="2" /><path d="M3 16l5-5 4 4 3-3 6 6" /></svg>
          <span>{files.length ? `${files.length} image${files.length > 1 ? "s" : ""} loaded — click to replace` : `Drop or select up to ${TRAIN_MAX} thumbnails`}</span>
        </label>
        {phase === "reading" && <div style={{ fontSize: 12.5, color: "var(--text-3)", marginTop: 8 }}>Loading & downscaling… {prog.done}/{prog.total}</div>}
        {files.length > 0 && (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 12 }}>
            {files.slice(0, 60).map((f, i) => <img key={i} src={f.preview} alt="" style={{ width: 64, height: 36, objectFit: "cover", borderRadius: 5, opacity: 0.9 }} />)}
            {files.length > 60 && <span style={{ fontSize: 12, color: "var(--text-3)", alignSelf: "center" }}>+{files.length - 60} more</span>}
          </div>
        )}
      </Block>

      <Block title="2 · Context" mood={mood}>
        <label className="ci-label">Niche / context (one cohesive set trains best)</label>
        <input className="ci-input" value={niche} onChange={e => setNiche(e.target.value)} placeholder="e.g. Finance explainer (Hindi) · Gaming · Beauty tutorials" />
        <label className="ci-label" style={{ marginTop: 12 }}>Owner notes (optional) — e.g. which were the biggest winners, CTR, what to weight</label>
        <textarea className="ci-textarea" style={{ minHeight: 60 }} value={notes} onChange={e => setNotes(e.target.value)} placeholder="e.g. The 900 Crore one did 2M+; the no-text one flopped…" />
        <div style={{ display: "flex", alignItems: "center", gap: 16, marginTop: 12, flexWrap: "wrap" }}>
          <label className="ci-label" style={{ margin: 0 }}>Images per request</label>
          <select className="ci-input" style={{ width: 90, appearance: "auto" }} value={batch} onChange={e => setBatch(+e.target.value)}>
            {[4, 6, 8, 10].map(n => <option key={n} value={n}>{n}</option>)}
          </select>
          <span style={{ fontSize: 12.5, color: "var(--text-3)" }}>{files.length} imgs · ~{Math.ceil(files.length / batch)} requests · est. ~{window.fmtCost(estCost)}</span>
        </div>
      </Block>

      <div style={{ display: "flex", alignItems: "center", gap: 14, margin: "4px 0 16px", flexWrap: "wrap" }}>
        <GlowButton mood={mood} size="lg" onClick={start} disabled={busy || !files.length}>
          {busy ? (phase === "synth" ? "Synthesizing playbook…" : phase === "running" ? `Analyzing ${prog.done}/${prog.total}…` : "Loading…") : "Start training →"}
        </GlowButton>
        {busy && phase !== "reading" && (
          <div style={{ flex: "1 1 200px", maxWidth: 320 }}>
            <div style={{ height: 8, borderRadius: 5, background: "var(--surface-2)", overflow: "hidden" }}>
              <div style={{ height: "100%", width: pct + "%", background: m.accentFrom, transition: "width .3s" }} />
            </div>
          </div>
        )}
        {err && <span style={{ fontSize: 12.5, color: "#f5788c", maxWidth: 420, lineHeight: 1.4 }}>{err}</span>}
      </div>

      {stats && (
        <Block title="Aggregated patterns" desc={`${stats.n} analyzed${stats.errors ? ` · ${stats.errors} failed` : ""}`} mood={mood}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(220px,1fr))", gap: 14, fontSize: 13 }}>
            <StatList title="Layouts" items={stats.layouts} n={stats.n} />
            <StatList title="Colour schemes" items={stats.colorSchemes} n={stats.n} />
            <StatList title="Face expressions" items={stats.faceExpressions} n={stats.n} />
            <StatList title="Power words" items={stats.powerWords} n={stats.n} />
            <StatList title="Badges" items={stats.badges} n={stats.n} />
            <div>
              <div style={{ fontWeight: 600, color: "var(--text-2)", marginBottom: 6 }}>Headline signals</div>
              <div style={{ color: "var(--text-3)", lineHeight: 1.8 }}>
                Face: <b style={{ color: "var(--text-1)" }}>{stats.withFacePct}%</b><br />
                Arrow: <b style={{ color: "var(--text-1)" }}>{stats.withArrowPct}%</b><br />
                Number hook: <b style={{ color: "var(--text-1)" }}>{stats.numberHookPct}%</b><br />
                Avg words: <b style={{ color: "var(--text-1)" }}>{stats.avgWordCount ?? "—"}</b>
              </div>
            </div>
          </div>
        </Block>
      )}

      {synth && (
        <>
          {synth.summary && (
            <Block mood={mood} style={{ background: `linear-gradient(135deg, ${m.orbC}55, var(--surface-1))`, border: `1px solid ${m.accentGlow}` }}>
              <Eyebrow mood={mood} glow>What this set teaches</Eyebrow>
              <div style={{ fontSize: 15, lineHeight: 1.55, marginTop: 8, color: "var(--text-1)" }}>{synth.summary}</div>
            </Block>
          )}
          <Block title="Proven-patterns playbook (editable)" desc="Goes into thumbnail.provenPatterns — the analyzer scores & regenerates against this for this niche." mood={mood}>
            <textarea className="ci-textarea" style={{ minHeight: 200, fontFamily: "var(--font-mono)", fontSize: 12.5, lineHeight: 1.6 }}
              value={synth.provenPatterns} onChange={e => setSynth(s => ({ ...s, provenPatterns: e.target.value }))} />
          </Block>
          <Block title="Design principles (editable)" desc="Replaces thumbnail.designPrinciples." mood={mood}>
            <textarea className="ci-textarea" style={{ minHeight: 150, fontFamily: "var(--font-mono)", fontSize: 12.5, lineHeight: 1.6 }}
              value={synth.designPrinciples} onChange={e => setSynth(s => ({ ...s, designPrinciples: e.target.value }))} />
          </Block>
          {(synth.layoutsToAdd.length > 0 || synth.colorSchemesToAdd.length > 0) && (
            <Block title="New library entries to add" mood={mood}>
              {synth.layoutsToAdd.map((x, i) => <div key={"l" + i} style={{ fontSize: 13, color: "var(--text-2)", padding: "4px 0" }}><b>Layout · {x.name}</b> — {x.what}</div>)}
              {synth.colorSchemesToAdd.map((x, i) => <div key={"c" + i} style={{ fontSize: 13, color: "var(--text-2)", padding: "4px 0" }}><b>Colour · {x.name}</b> — {x.what}</div>)}
            </Block>
          )}
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginTop: 6, flexWrap: "wrap" }}>
            <label style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 13, color: "var(--text-2)" }}>
              <input type="checkbox" checked={append} onChange={e => setAppend(e.target.checked)} /> Append to existing patterns (keep other niches)
            </label>
            <GlowButton mood={mood} onClick={saveToResearch}>Save to research (private)</GlowButton>
            {onNav && <button className="ci-copybtn" style={{ height: 38 }} onClick={() => onNav("research")}>Open Research to publish →</button>}
          </div>
          {msg && <div style={{ fontSize: 12.5, color: "var(--text-2)", marginTop: 10, maxWidth: 560, lineHeight: 1.5 }}>{msg}</div>}
        </>
      )}
    </div>
  );
}

function StatList({ title, items, n }) {
  if (!items || !items.length) return null;
  return (
    <div>
      <div style={{ fontWeight: 600, color: "var(--text-2)", marginBottom: 6 }}>{title}</div>
      {items.map(([k, c], i) => (
        <div key={i} style={{ display: "flex", justifyContent: "space-between", gap: 10, color: "var(--text-3)", padding: "2px 0" }}>
          <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{k}</span>
          <b style={{ color: "var(--text-1)" }}>{Math.round((c / (n || 1)) * 100)}%</b>
        </div>
      ))}
    </div>
  );
}

Object.assign(window, { TrainTab });
</script>

<script type="text/babel" data-presets="react">
/* ===== ci-account.jsx ===== */
// ContentIntel — Accounts (Supabase): sign up w/ email confirmation, sign in,
// profile + plan + usage bar, sign out. Activates ONLY when window.CI_SAAS is
// configured (see saas/SETUP.md) — otherwise the app stays BYO-key, unchanged.

const SAAS = (typeof window !== 'undefined' && window.CI_SAAS) || {};
const saasOn = !!(SAAS.supabaseUrl && SAAS.supabaseAnonKey);

// Lazy-load supabase-js only when configured (zero weight otherwise).
let __sb = null;
function getSupabase() {
  return new Promise((resolve, reject) => {
    if (__sb) return resolve(__sb);
    if (!saasOn) return reject(new Error('SaaS not configured'));
    const make = () => { __sb = window.supabase.createClient(SAAS.supabaseUrl, SAAS.supabaseAnonKey); resolve(__sb); };
    if (window.supabase) return make();
    const sc = document.createElement('script');
    sc.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
    sc.onload = make;
    sc.onerror = () => reject(new Error('Could not load the sign-in library.'));
    document.head.appendChild(sc);
  });
}

// Keep the session token globally so the engine can route through the worker.
async function refreshSession() {
  try {
    const sb = await getSupabase();
    const { data } = await sb.auth.getSession();
    window.CI_SESSION = data.session ? data.session.access_token : null;
    window.CI_USER = data.session ? data.session.user : null;
    window.dispatchEvent(new Event('ci-auth'));
    return data.session;
  } catch (e) { return null; }
}
if (saasOn) refreshSession();
window.refreshSession = refreshSession;

const PLAN_LABEL = { free: 'Free — 5 checks', starter: 'Starter — 50/mo', pro: 'Creator Pro — 250/mo', agency: 'Agency — 1,000/mo' };
const PLAN_LIMIT = { free: 5, starter: 50, pro: 250, agency: 1000 };

function AccountModal({ open, onClose, onNav }) {
  const [mode, setMode] = React.useState('signin'); // signin | signup | profile
  const [email, setEmail] = React.useState('');
  const [pass, setPass] = React.useState('');
  const [msg, setMsg] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const [profile, setProfile] = React.useState(null);

  React.useEffect(() => {
    if (!open) return;
    setMsg('');
    refreshSession().then(sess => {
      if (sess) { setMode('profile'); loadProfile(); }
      else setMode('signin');
    });
  }, [open]);

  async function loadProfile() {
    try {
      const sb = await getSupabase();
      const { data: { user } } = await sb.auth.getUser();
      if (!user) return;
      const { data } = await sb.from('profiles').select('plan, checks_used, email, full_name').eq('id', user.id).single();
      setProfile({ ...(data || { plan: 'free', checks_used: 0 }), email: user.email });
    } catch (e) {}
  }

  async function submit() {
    if (!email.trim() || pass.length < 8) { setMsg('Enter your email and a password of 8+ characters.'); return; }
    setBusy(true); setMsg('');
    try {
      const sb = await getSupabase();
      if (mode === 'signup') {
        const { error } = await sb.auth.signUp({ email: email.trim(), password: pass });
        if (error) throw error;
        setMsg('✓ Account created — check your inbox and click the confirmation link, then sign in.');
        setMode('signin');
      } else {
        const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password: pass });
        if (error) throw error;
        await refreshSession();
        setMode('profile'); loadProfile();
      }
    } catch (e) {
      setMsg(e.message === 'Email not confirmed' ? 'Confirm your email first — check your inbox (and spam).' : (e.message || 'Something went wrong.'));
    }
    setBusy(false);
  }

  async function signOut() {
    try { const sb = await getSupabase(); await sb.auth.signOut(); } catch (e) {}
    window.CI_SESSION = null; window.CI_USER = null;
    window.dispatchEvent(new Event('ci-auth'));
    onClose();
  }

  if (!open) return null;
  const limit = profile ? (PLAN_LIMIT[profile.plan] || 5) : 5;
  const used = profile ? (profile.checks_used || 0) : 0;
  const pct = Math.min(100, Math.round(used / limit * 100));

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 200, display: 'grid', placeItems: 'center', background: 'rgba(4,6,12,0.6)', backdropFilter: 'blur(6px)' }} onClick={onClose}>
      <div className="ci-block" style={{ width: 420, maxWidth: '92vw', padding: 28 }} onClick={e => e.stopPropagation()}>
        {mode !== 'profile' ? (
          <>
            <div style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 28 }}>{mode === 'signup' ? 'Create your account' : 'Welcome back'}</div>
            <div style={{ fontSize: 13, color: 'var(--text-3)', marginTop: 6, lineHeight: 1.55 }}>
              {mode === 'signup' ? '5 free checks on us. We confirm your email — no card needed.' : 'Sign in to run checks on your plan.'}
            </div>
            <input className="ci-input" style={{ marginTop: 18 }} type="email" placeholder="you@email.com" value={email} onChange={e => setEmail(e.target.value)} />
            <input className="ci-input" style={{ marginTop: 10 }} type="password" placeholder="Password (8+ characters)" value={pass} onChange={e => setPass(e.target.value)} onKeyDown={e => e.key === 'Enter' && submit()} />
            {msg && <div style={{ fontSize: 12.5, marginTop: 12, lineHeight: 1.5, color: msg.startsWith('✓') ? '#8FD86A' : '#f5788c' }}>{msg}</div>}
            <div style={{ marginTop: 16 }}>
              <GlowButton mood="burgundy" size="lg" style={{ width: '100%', justifyContent: 'center' }} onClick={submit}>
                {busy ? 'One moment…' : mode === 'signup' ? 'Create account →' : 'Sign in →'}
              </GlowButton>
            </div>
            <div style={{ fontSize: 12.5, color: 'var(--text-4)', marginTop: 14, textAlign: 'center' }}>
              {mode === 'signup'
                ? <span>Already have an account? <a onClick={() => { setMode('signin'); setMsg(''); }} style={{ color: 'var(--text-2)', cursor: 'pointer', textDecoration: 'underline' }}>Sign in</a></span>
                : <span>New here? <a onClick={() => { setMode('signup'); setMsg(''); }} style={{ color: 'var(--text-2)', cursor: 'pointer', textDecoration: 'underline' }}>Create an account — 5 free checks</a></span>}
            </div>
          </>
        ) : (
          <>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ width: 42, height: 42, borderRadius: '50%', background: 'linear-gradient(135deg, #6A1F35, #FF4D8D)', display: 'grid', placeItems: 'center', fontWeight: 700, color: '#fff', fontSize: 16 }}>
                {(profile?.email || 'U')[0].toUpperCase()}
              </div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15 }}>{profile?.email || '…'}</div>
                <div style={{ fontSize: 12, color: 'var(--text-3)' }}>{PLAN_LABEL[profile?.plan] || PLAN_LABEL.free}</div>
              </div>
            </div>
            <div style={{ marginTop: 20 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12.5, color: 'var(--text-3)', marginBottom: 7 }}>
                <span>Checks used this month</span><b style={{ color: 'var(--text-1)' }}>{used} / {limit}</b>
              </div>
              <div style={{ height: 8, borderRadius: 5, background: 'var(--stroke-1)', overflow: 'hidden' }}>
                <div style={{ height: '100%', width: pct + '%', borderRadius: 5, background: pct > 85 ? '#F06A7E' : pct > 60 ? '#F0C85A' : '#8FD86A', transition: 'width 0.8s cubic-bezier(0.2,0.7,0.3,1)' }} />
              </div>
            </div>
            {(profile?.plan || 'free') !== 'agency' && (
              <div style={{ marginTop: 18 }}>
                <GlowButton mood="burgundy" style={{ width: '100%', justifyContent: 'center' }} onClick={() => { onClose(); onNav && onNav('pricing'); }}>
                  {profile?.plan === 'free' ? 'Upgrade — from ₹499/mo →' : 'Upgrade your plan →'}
                </GlowButton>
              </div>
            )}
            <div style={{ marginTop: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: 11.5, color: 'var(--text-5)' }}>Your content is never stored — only this counter.</span>
              <button className="ci-copybtn" style={{ height: 32 }} onClick={signOut}>Sign out</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}
window.AccountModal = AccountModal;
window.CI_SAAS_ON = saasOn;
</script>
<script type="text/babel" data-presets="react">
/* ===== ci-app.jsx ===== */
// ContentIntel -- main app

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "typeSet": "grotesk",
  "density": "regular",
  "bloomIntensity": 1,
  "homeAccent": "burgundy"
}/*EDITMODE-END*/;

function CIApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme = useCITheme();
  const [tab, setTab] = React.useState('home');
  const [focusMode, setFocusMode] = React.useState(false);
  const [keyOpen, setKeyOpen] = React.useState(false);
  const [accountOpen, setAccountOpen] = React.useState(false);
  const [hasKey, setHasKey] = React.useState(!!window.getKey());
  const [admin, setAdmin] = React.useState(window.isAdmin());

  React.useEffect(() => {
    const root = document.documentElement;
    const type = window.TYPES[t.typeSet] || window.TYPES.grotesk;
    root.style.setProperty('--font-display', type.display);
    root.style.setProperty('--font-ui', type.ui);
    root.style.setProperty('--font-mono', type.mono);
    root.style.setProperty('--display-tracking', type.displayTracking);
    root.style.setProperty('--display-case', type.displayCaps ? 'uppercase' : 'none');
    const d = window.DENSITIES[t.density] || window.DENSITIES.regular;
    root.style.setProperty('--ui-size', d.ui + 'px');
    root.style.setProperty('--bloom-mul', t.bloomIntensity);
  }, [t.typeSet, t.density, t.bloomIntensity]);

  // focus mode dims ambient bloom
  React.useEffect(() => {
    let el = document.getElementById('ci-focus-style');
    if (!el) { el = document.createElement('style'); el.id = 'ci-focus-style'; document.head.appendChild(el); }
    el.textContent = focusMode ? '.bloom-orb,.ci-hero-video{opacity:0.12 !important}.ci-hero-scrim{background:#07090E !important}' : '';
  }, [focusMode]);

  const activeMood = tab === 'home' ? t.homeAccent
    : (window.CI_TABS.find(x => x.id === tab) || {}).mood || 'burgundy';

  function nav(id) {
    setTab(id);
    document.querySelector('.ci-scroll')?.scrollTo({ top: 0, behavior: 'instant' });
  }

  function openKey() { setKeyOpen(true); }
  function closeKey(changed) { setKeyOpen(false); if (changed) setHasKey(!!window.getKey()); }
  function onAdmin() { nav('research'); }
  function exitResearch() { setAdmin(window.isAdmin()); nav('home'); }

  // If unlocked via ?admin=... on this browser, jump straight to the editor.
  React.useEffect(() => {
    try {
      if (window.isAdmin() && new URLSearchParams(location.search).get('admin')) { setAdmin(true); setTab('research'); }
    } catch (e) {}
  }, []);

  let View = null;
  if (tab === 'home') View = <HomeView onNav={nav} onOpenKey={openKey} hasKey={hasKey} />;
  else if (tab === 'script') View = <ScriptTab onOpenKey={openKey} />;
  else if (tab === 'thumbnail') View = <ThumbnailTab onOpenKey={openKey} />;
  else if (tab === 'title') View = <TitleTab onOpenKey={openKey} />;
  else if (tab === 'ads') View = <AdsTab onOpenKey={openKey} />;
  else if (tab === 'ask') View = <AskTab onOpenKey={openKey} />;
  else if (tab === 'pricing') View = <PricingTab onNav={nav} />;
  else if (tab === 'builder') View = <BuilderTab />;
  else if (tab === 'platform') View = <PlatformTab />;
  else if (tab === 'playbook') View = <PlaybookTab />;
  else if (tab === 'history') View = <HistoryTab />;
  else if (tab === 'research') View = admin ? <ResearchTab onClose={exitResearch} onNav={nav} /> : <HomeView onNav={nav} onOpenKey={openKey} hasKey={hasKey} />;
  else if (tab === 'train') View = admin ? <TrainTab onClose={exitResearch} onNav={nav} onOpenKey={openKey} /> : <HomeView onNav={nav} onOpenKey={openKey} hasKey={hasKey} />;

  // Preload all videos into the browser cache on first mount
  React.useEffect(() => {
    const urls = Object.values(window.CI_VIDEOS || {}).filter(Boolean);
    urls.forEach(url => {
      const v = document.createElement('video');
      v.src = url;
      v.preload = 'auto';
      v.muted = true;
    });
  }, []);

  // Dismiss splash screen once app is mounted
  React.useEffect(() => {
    const el = document.getElementById('ci-splash');
    if (!el) return;
    const t = setTimeout(() => {
      el.style.opacity = '0';
      setTimeout(() => { try { el.remove(); } catch(e){} }, 600);
    }, 1400);
    return () => clearTimeout(t);
  }, []);

  const V = window.CI_VIDEOS || {};
  const ambientDark  = V.ambientDark  || '';
  const ambientLight = V.ambientLight || V.ambientDark || '';
  const onTool = tab !== 'home';

  return (
    <div className="ci-app">
      <TopNav active={tab} onNav={nav} mood={activeMood} focusMode={focusMode} onToggleFocus={() => setFocusMode(f => !f)}
        onOpenKey={openKey} onAdmin={onAdmin} onAccount={() => setAccountOpen(true)} hasKey={hasKey} admin={admin} />
      <KeyModal open={keyOpen} onClose={closeKey} />
      {window.AccountModal && <window.AccountModal open={accountOpen} onClose={() => setAccountOpen(false)} onNav={nav} />}

      {/* Ambient videos: ALWAYS mounted so the browser never reloads them on tab switch.
          Visibility is controlled by opacity + CSS transition only. */}
      {ambientDark && (
        <video src={ambientDark} autoPlay muted loop playsInline
          style={{ position:'fixed', inset:0, width:'100%', height:'100%', objectFit:'cover',
                   pointerEvents:'none', zIndex:0,
                   opacity: onTool && theme !== 'light' ? 0.08 : 0,
                   transition: 'opacity 0.7s ease' }} />
      )}
      {ambientLight && (
        <video src={ambientLight} autoPlay muted loop playsInline
          style={{ position:'fixed', inset:0, width:'100%', height:'100%', objectFit:'cover',
                   pointerEvents:'none', zIndex:0,
                   opacity: onTool && theme === 'light' ? 0.05 : 0,
                   transition: 'opacity 0.7s ease' }} />
      )}

      <div className="ci-scroll" style={{ position: 'relative', minHeight: 'calc(100vh - 60px)' }}>
        {onTool && (
          <div style={{ position: 'fixed', top: 60, left: 0, right: 0, height: '60vh', pointerEvents: 'none', zIndex: 0, opacity: 0.5 }}>
            <AmbientBloom mood={activeMood} intensity={0.5} variant="subtle" />
          </div>
        )}
        {View}
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Home accent" />
        <TweakColor
          label="Hero mood"
          value={window.MOODS[t.homeAccent].swatch}
          options={['burgundy', 'navy', 'violet', 'ember'].map(k => window.MOODS[k].swatch)}
          onChange={v => {
            const f = Object.entries(window.MOODS).find(([k, m]) => m.swatch === v);
            if (f) setTweak('homeAccent', f[0]);
          }}
        />

        <TweakSection label="Typography" />
        <TweakRadio label="Type set" value={t.typeSet}
          options={[{ value: 'grotesk', label: 'Grotesk' }, { value: 'editorial', label: 'Editorial' }, { value: 'poster', label: 'Poster' }]}
          onChange={v => setTweak('typeSet', v)} />

        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density}
          options={[{ value: 'compact', label: 'Compact' }, { value: 'regular', label: 'Regular' }, { value: 'comfy', label: 'Comfy' }]}
          onChange={v => setTweak('density', v)} />

        <TweakSection label="Atmosphere" />
        <TweakSlider label="Bloom intensity" value={t.bloomIntensity} min={0.2} max={1.4} step={0.05}
          onChange={v => setTweak('bloomIntensity', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CIApp />);
</script>
</body>
</html>
